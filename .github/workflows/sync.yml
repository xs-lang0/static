name: Sync release assets

on:
  # run when triggered by xs repo release, or manually
  repository_dispatch:
    types: [release]
  workflow_dispatch:
  schedule:
    # check daily in case dispatch was missed
    - cron: "0 6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest release assets
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/xs-lang0/xs/releases/latest)
          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          echo "latest release: $TAG"

          # Prefer xs-browser.wasm when the release ships one - it's the
          # smaller build with TLS / http_server / x509 / RSA / EC stripped
          # out, which is what every browser caller actually wants. Fall
          # back to the full xs.wasm for older releases that didn't ship
          # a separate browser build.
          BROWSER_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name=="xs-browser.wasm") | .browser_download_url')
          if [ -n "$BROWSER_URL" ] && [ "$BROWSER_URL" != "null" ]; then
            echo "downloading xs-browser.wasm..."
            curl -L -o public/xs.wasm "$BROWSER_URL"
            echo "xs.wasm (from browser build): $(wc -c < public/xs.wasm) bytes"
          else
            WASM_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name=="xs.wasm") | .browser_download_url')
            if [ -n "$WASM_URL" ] && [ "$WASM_URL" != "null" ]; then
              echo "downloading xs.wasm (full)..."
              curl -L -o public/xs.wasm "$WASM_URL"
              echo "xs.wasm: $(wc -c < public/xs.wasm) bytes"
            else
              echo "no wasm asset found in release $TAG"
            fi
          fi

          # write version file
          echo "$TAG" > public/version.txt

      - name: Commit and push if changed
        run: |
          git config user.name "xs-lang0"
          git config user.email "xslang.090@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "sync assets from $TAG"
            git push
          fi
